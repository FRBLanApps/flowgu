name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version-file: pubspec.yaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build Linux release bundle
        run: flutter build linux --release

      - name: Package Linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf "dist/flowgu-linux-x64.tar.gz" .
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          cat > nfpm.yaml <<EOF
          name: flowgu
          arch: amd64
          platform: linux
          version: ${VERSION}
          section: utils
          priority: optional
          maintainer: tyLingyu <tyLingyu@users.noreply.github.com>
          description: Flowgu Flutter client for Luogu
          license: MIT
          contents:
            - src: build/linux/x64/release/bundle/
              dst: /opt/flowgu
            - src: /opt/flowgu/flowgu
              dst: /usr/bin/flowgu
              type: symlink
          EOF
          nfpm package --config nfpm.yaml --target "dist/flowgu_${VERSION}_amd64.deb" --packager deb
          nfpm package --config nfpm.yaml --target "dist/flowgu_${VERSION}_amd64.rpm" --packager rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version-file: pubspec.yaml

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build Windows release bundle
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/flowgu-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version-file: pubspec.yaml

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-windows
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*